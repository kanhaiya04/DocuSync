name: Build Snap Package

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-snap:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: client/package-lock.json
        
    - name: Install dependencies
      run: |
        cd client
        npm install
        
    - name: Build React app
      run: |
        cd client/app
        npm install
        npm run build
        
    - name: Install snapcraft
      run: |
        sudo snap install snapcraft --classic
        
    - name: Build Electron app for Linux (including snap)
      run: |
        cd client
        npx electron-forge make
      env:
        SNAPCRAFT_BUILD_ENVIRONMENT: host
        
    - name: List built files
      run: |
        ls -laR client/out/make/ || echo "No make output found"
        find client/out/make -name "*.snap" || echo "No snap files found"
        
    - name: Upload snap as artifact
      uses: actions/upload-artifact@v4
      with:
        name: docusync-snap-${{ github.sha }}
        path: client/out/make/**/*.snap
        retention-days: 30
