name: Build Snap Package

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-snap:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: client/package-lock.json
        
    - name: Install dependencies
      run: |
        cd client
        npm ci
        
    - name: Build React app
      run: |
        cd client/app
        npm ci
        npm run build
        
    - name: Install snapcraft
      run: |
        sudo snap install snapcraft --classic
        
    - name: Build Electron app for Linux (without snap)
      run: |
        cd client
        npx electron-forge make --targets=@electron-forge/maker-deb,@electron-forge/maker-rpm
        
    - name: List deb package contents
      run: |
        ls -la client/out/make/deb/x64/
        dpkg -c client/out/make/deb/x64/*.deb || echo "No deb files found"
        
    - name: Build snap (destructive mode)
      run: |
        cd client/snap
        snapcraft --destructive-mode
        
    - name: List built files
      run: |
        ls -la client/snap/*.snap || echo "No snap files found"
        ls -la client/out/make/ || echo "No make output found"
        
    - name: Upload snap as artifact
      uses: actions/upload-artifact@v4
      with:
        name: docusync-snap-${{ github.sha }}
        path: client/snap/*.snap
        retention-days: 30
