name: Build Linux Packages

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-snap:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: client/package-lock.json
        
    - name: Install dependencies
      run: |
        cd client
        npm install
        
    - name: Build React app
      run: |
        cd client/app
        npm install
        npm run build
        
    - name: Build Electron app for Linux (deb and rpm)
      run: |
        cd client
        npx electron-forge make
        
    - name: List built files
      run: |
        ls -laR client/out/make/ || echo "No make output found"
        find client/out/make -name "*.deb" || echo "No deb files found"
        find client/out/make -name "*.rpm" || echo "No rpm files found"
        
    - name: Upload deb package as artifact
      uses: actions/upload-artifact@v4
      with:
        name: docusync-deb-${{ github.sha }}
        path: client/out/make/**/*.deb
        retention-days: 30
        
    - name: Upload rpm package as artifact
      uses: actions/upload-artifact@v4
      with:
        name: docusync-rpm-${{ github.sha }}
        path: client/out/make/**/*.rpm
        retention-days: 30
