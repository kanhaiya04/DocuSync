name: Build and Publish Snap

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: client/package-lock.json
        
    - name: Install dependencies
      run: |
        cd client
        npm ci
        
    - name: Build React app
      run: |
        cd client
        npm run build
        
    - name: Build Electron app for Linux
      run: |
        cd client
        npm run make
        
    - name: Install snapcraft
      run: |
        sudo snap install snapcraft --classic
        
    - name: Install LXD
      run: |
        sudo snap install lxd
        sudo lxd init --auto
        
    - name: Build snap
      run: |
        cd client
        snapcraft --use-lxd
        
    - name: List built files
      run: |
        ls -la client/*.snap || echo "No snap files found"
        
    - name: Upload snap to store (only if secrets are configured)
      if: ${{ secrets.SNAP_STORE_AUTH != '' }}
      run: |
        snapcraft upload client/*.snap --release=edge
      env:
        SNAP_STORE_AUTH: ${{ secrets.SNAP_STORE_AUTH }}
        
    - name: Upload snap as artifact (for manual testing)
      uses: actions/upload-artifact@v4
      with:
        name: docsync-snap
        path: client/*.snap
